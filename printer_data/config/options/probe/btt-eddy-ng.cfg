

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -16
y_offset: 11.5
write_tap_plot: true

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[bed_mesh]
speed: 200
horizontal_move_z: 2
mesh_min: 15,18
mesh_max: 335,335
probe_count: 15,15
algorithm: bicubic
bicubic_tension: 0.5
split_delta_z: 0.0125
mesh_pps: 3,3
adaptive_margin: 5
fade_start: 1
fade_end: 10
fade_target: 0
#scan_overshoot: 5

[safe_z_home]
home_xy_position: 175, 175
z_hop: 10
z_hop_speed: 25
speed: 200