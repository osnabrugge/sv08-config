[gcode_macro Z_MOTOR_TEST]
description: Test ONE Z motor with custom distance and velocity
gcode:
    {% if not params.MOTOR %}
        {action_raise_error("Use MOTOR=z / z1 / z2 / z3")}
    {% endif %}

    {% set motor = "stepper_" ~ params.MOTOR %}
    {% set dist = params.DISTANCE|default(1)|float %}
    {% set vel  = params.VELOCITY|default(5)|float %}

    {action_respond_info("Enabling " ~ motor)}
    SET_STEPPER_ENABLE STEPPER={motor} ENABLE=1

    G4 P500

    {action_respond_info("Moving " ~ motor ~ " by " ~ dist ~ "mm at " ~ vel ~ "mm/s")}
    FORCE_MOVE STEPPER={motor} DISTANCE={dist} VELOCITY={vel}
